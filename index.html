<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantity Measurement App</title>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <div class="branding">
        <div class="circle circle1"></div>
        <div class="circle circle2"></div>
        <div class="ruler-icon">📏</div>
        <h1>Quantity Measurement App</h1>
        <p>Measure, Convert and Compare Units Easily</p>
      </div>
    </div>

    <div class="right-panel">
      <div class="form-box">
        <div class="tabs">
          <span class="tab active" id="loginTab">LOGIN</span>
          <span class="tab" id="signupTab">SIGNUP</span>
        </div>

        <form id="loginForm" class="form active-form">
          <label for="loginEmail">Email Id</label>
          <input type="email" id="loginEmail" placeholder="Enter your email" />

          <label for="loginPassword">Password</label>
          <div class="password-wrapper">
            <input type="password" id="loginPassword" placeholder="Enter your password" />
            <i class="fa-solid fa-eye-slash"></i>
          </div>

          <button type="submit">Login</button>
        </form>

        <form id="signupForm" class="form">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" placeholder="Enter your full name" />

          <label for="signupEmail">Email Id</label>
          <input type="email" id="signupEmail" placeholder="Enter your email" />

          <label for="signupPassword">Password</label>
          <div class="password-wrapper">
            <input type="password" id="signupPassword" placeholder="Enter your password" />
            <i class="fa-solid fa-eye-slash"></i>
          </div>

          <label for="mobileNumber">Mobile Number</label>
          <input type="text" id="mobileNumber" placeholder="Enter your mobile number" />

          <button type="submit">Signup</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const loginTab = document.getElementById("loginTab");
    const signupTab = document.getElementById("signupTab");
    const loginForm = document.getElementById("loginForm");
    const signupForm = document.getElementById("signupForm");

    loginTab.addEventListener("click", () => {
      loginTab.classList.add("active");
      signupTab.classList.remove("active");
      loginForm.classList.add("active-form");
      signupForm.classList.remove("active-form");
    });

    signupTab.addEventListener("click", () => {
      signupTab.classList.add("active");
      loginTab.classList.remove("active");
      signupForm.classList.add("active-form");
      loginForm.classList.remove("active-form");
    });
  </script>
</body>
</html>
